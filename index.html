<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anisa ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: white;
}

.container {
  margin-top: 100px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #ff4b5c;
  color: white;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
}

img {
  width: 200px;
  border-radius: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Enter Passcode 🔐</h2>
  <input type="password" id="passcode" placeholder="Enter code">
  <br><br>
  <button onclick="unlock()">Open Surprise 💖</button>
</div>

<div id="surprise" class="hidden">
  <h1>Happy Birthday Anisa 🎂❤️</h1>

  <p>
    Anisa, you are the most special person in my life 💖<br>
    I love you more than words can explain ❤️
  </p>

  <p>
    🎀 Pashto Message 🎀<br><br>
    "Za sta sara dera meena laram ❤️<br>
    Ta zama da zra malika ye 💖<br>
    Har kala ba sta sara yum 🥺❤️"
  </p>

  <img src="https://i.imgur.com/4M7IWwP.png">

  <p>From: Anas ❤️</p>

  <audio controls>
    <source src="your-voice.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function unlock() {
  var code = document.getElementById("passcode").value;

  if(code === "1234") {
    document.querySelector(".container").style.display = "none";
    document.getElementById("surprise").classList.remove("hidden");
  } else {
    alert("Wrong passcode 😢");
  }
}
</script>

</body>
</html>
